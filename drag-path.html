        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .lyric-line { transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out; transform-origin: left center; scroll-margin-top: 160px; }
        .lyric-line.active { opacity: 1 !important; transform: scale(1.03); }
        .lyric-line.inactive { opacity: 0.25; transform: scale(1); }
        .toggle-btn.active { background-color: rgba(255, 255, 255, 0.2); color: white; border-color: transparent; }
        .toggle-btn { background-color: transparent; color: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.3); }
        .bg-spotify-desktop-gradient { background: linear-gradient(135deg, #A82417 0%, #121212 60%, #121212 100%); }
        .icon-solid { fill: currentColor; stroke: currentColor; }
    </style>

        let showPron = true; let showEsp = true;
        const container = document.getElementById('lyrics-container');
        const togglePronBtn = document.getElementById('toggle-pron');

        function renderLyrics() {
            lyricsData.forEach((lyric, index) => {
                const block = document.createElement('div');
                block.className = 'lyric-line inactive cursor-pointer py-1';
                block.dataset.index = index;
                block.innerHTML = `
                    <div class="text-[24px] md:text-[28px] font-bold text-white tracking-tight leading-tight mb-1.5 layer-en">${lyric.en}</div>
                    <div class="text-[14px] md:text-[15px] italic text-white/50 layer-pron mb-1 transition-all duration-300 ${showPron ? 'block' : 'hidden'}">${lyric.pron}</div>
                    <div class="text-[15px] md:text-[16px] text-white/70 layer-es transition-all duration-300 ${showEsp ? 'block' : 'hidden'}">${lyric.es}</div>
                `;
                block.addEventListener('click', () => { block.scrollIntoView({ behavior: 'smooth', block: 'start' }); });
                container.appendChild(block);
            });
        }
        function updateLayersVisibility() {
            document.querySelectorAll('.layer-pron').forEach(el => el.style.display = showPron ? 'block' : 'none');
            document.querySelectorAll('.layer-es').forEach(el => el.style.display = showEsp ? 'block' : 'none');
        }
        togglePronBtn.addEventListener('click', () => { showPron = !showPron; togglePronBtn.classList.toggle('active'); updateLayersVisibility(); });
        toggleEspBtn.addEventListener('click', () => { showEsp = !showEsp; toggleEspBtn.classList.toggle('active'); updateLayersVisibility(); });
        
        function initManualScrollSync() {
            const observerOptions = { root: container, rootMargin: '-15% 0px -65% 0px', threshold: 0 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        document.querySelectorAll('.lyric-line').forEach(el => { el.classList.remove('active'); el.classList.add('inactive'); });
                        entry.target.classList.remove('inactive'); entry.target.classList.add('active');
                    }
                });
            }, observerOptions);
            document.querySelectorAll('.lyric-line').forEach(line => observer.observe(line));
        }
        renderLyrics();
        initManualScrollSync();
