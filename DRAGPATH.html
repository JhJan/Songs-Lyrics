<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag Path - Manual Lyrics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .lyric-line { opacity: 0.3; transition: all 0.4s ease; transform: scale(1); cursor: pointer; }
        .lyric-line.active { opacity: 1 !important; transform: scale(1.05); color: #fff; }
        .bg-spotify-gradient { background: linear-gradient(180deg, #A82417 0%, #121212 100%); }
        .toggle-btn.active { background-color: rgba(255, 255, 255, 0.2); border-color: transparent; }
        .toggle-btn { background: transparent; border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="flex items-center justify-center h-screen">

    <div class="relative w-[400px] h-[800px] bg-spotify-gradient rounded-3xl overflow-hidden flex flex-col shadow-2xl">
        <!-- Header -->
        <div class="p-6 pt-12 flex justify-between items-center z-10">
            <span class="text-xs font-bold tracking-widest uppercase">Letras</span>
            <div class="flex gap-2">
                <button id="toggle-pron" class="toggle-btn active px-3 py-1 text-[10px] font-bold rounded-full uppercase">PRON</button>
                <button id="toggle-esp" class="toggle-btn active px-3 py-1 text-[10px] font-bold rounded-full uppercase">ESP</button>
            </div>
        </div>

        <!-- Lyrics Container -->
        <div id="lyrics-container" class="flex-1 overflow-y-auto no-scrollbar px-6 pt-10 pb-40 scroll-smooth">
            <div class="h-20"></div> <!-- Spacer -->
            <!-- Las letras se inyectan aquí -->
        </div>

        <!-- Manual Footer Indicator -->
        <div class="absolute bottom-6 w-full text-center text-white/50 text-[10px] uppercase tracking-widest pointer-events-none">
            Haz clic para avanzar
        </div>
    </div>

    <script>
        const lyricsData = [
            { en: "When I see the devil's eyes", pron: "Wuen ai si de devils ais", es: "Cuando veo los ojos del diablo" },
            { en: "A current travels down my spine", pron: "A corrent travels daun mai spain", es: "Un escalofrío recorre mi espalda" },
            { en: "He found me", pron: "Ji faund mi", es: "Él me encontró" },
            { en: "Seems as though I've lost again", pron: "Sims as dou aiv lost aguen", es: "Parece que he perdido otra vez" },
            { en: "A story told ad nauseam", pron: "A stori told ad nosiam", es: "Una historia contada hasta el hartazgo" },
            { en: "He found me", pron: "Ji faund mi", es: "Él me encontró" }
            // ... (Añade aquí el resto de tus líneas de la misma forma)
        ];

        let currentIndex = 0;
        const container = document.getElementById('lyrics-container');

        // Renderizado
        lyricsData.forEach((l, i) => {
            const div = document.createElement('div');
            div.className = "lyric-line text-2xl font-bold tracking-tight mb-8";
            div.innerHTML = `
                <div class="layer-en">${l.en}</div>
                <div class="layer-pron text-base italic text-white/50">${l.pron}</div>
                <div class="layer-es text-base text-white/70">${l.es}</div>
            `;
            div.onclick = advanceLyric; // Clic en cualquier línea avanza
            container.appendChild(div);
        });

        function advanceLyric() {
            if (currentIndex < lyricsData.length - 1) {
                currentIndex++;
                updateView();
            }
        }

        function updateView() {
            const lines = document.querySelectorAll('.lyric-line');
            lines.forEach((el, i) => {
                if (i === currentIndex) {
                    el.classList.add('active');
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    el.classList.remove('active');
                }
            });
        }

        // Toggles
        document.getElementById('toggle-pron').onclick = function() {
            this.classList.toggle('active');
            document.querySelectorAll('.layer-pron').forEach(el => el.style.display = this.classList.contains('active') ? 'block' : 'none');
        };
        
        document.getElementById('toggle-esp').onclick = function() {
            this.classList.toggle('active');
            document.querySelectorAll('.layer-es').forEach(el => el.style.display = this.classList.contains('active') ? 'block' : 'none');
        };

        // Inicializar
        updateView();
    </script>
</body>
</html>
