<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drag Path - Spotify Premium UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Ocultar barra de scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Transiciones de letras */
        .lyric-line {
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
            transform-origin: left center;
        }
        .lyric-line.active {
            opacity: 1 !important;
            transform: scale(1.02);
        }
        .lyric-line.inactive {
            opacity: 0.3;
            transform: scale(1);
        }

        /* Toggles activos */
        .toggle-btn.active {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border-color: transparent;
        }
        .toggle-btn {
            background-color: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Degradado de fondo */
        .bg-spotify-gradient {
            background: linear-gradient(180deg, #A82417 0%, #68170D 40%, #121212 100%);
        }

        /* Para iconos sólidos perfectos */
        .icon-solid {
            fill: currentColor;
            stroke: currentColor;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-black">

    <!-- Mobile App Container -->
    <div class="relative w-full max-w-[400px] h-[100dvh] sm:h-[850px] sm:rounded-[40px] overflow-hidden bg-spotify-gradient shadow-2xl flex flex-col">
        
        <!-- Top Header (Letras) -->
        <header class="flex items-center justify-between px-6 pt-12 pb-4 relative z-20">
            <button class="p-2 -ml-2 text-white/80 hover:text-white active:scale-95 transition-transform">
                <i data-lucide="chevron-down" class="w-7 h-7"></i>
            </button>
            
            <div class="flex flex-col items-center">
                <span class="text-xs font-bold tracking-widest text-white/80 uppercase">Letras</span>
                <div class="flex items-center gap-2 mt-1">
                    <button id="toggle-pron" class="toggle-btn active px-3 py-1 text-[10px] font-bold rounded-full transition-colors uppercase tracking-wider">
                        Pron
                    </button>
                    <button id="toggle-esp" class="toggle-btn active px-3 py-1 text-[10px] font-bold rounded-full transition-colors uppercase tracking-wider">
                        Esp
                    </button>
                </div>
            </div>

            <button class="p-2 -mr-2 text-white/80 hover:text-white active:scale-95 transition-transform">
                <i data-lucide="more-horizontal" class="w-7 h-7"></i>
            </button>
        </header>

        <!-- Lyrics Container -->
        <main id="lyrics-container" class="flex-1 overflow-y-auto no-scrollbar px-6 pb-72 pt-8 space-y-8 relative z-10 scroll-smooth">
            <!-- Letras inyectadas vía JS -->
            <div id="spacer-top" class="h-10"></div>
        </main>

        <!-- Bottom Player Controls (Basado en la imagen de referencia) -->
        <footer class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black via-[#121212] to-transparent pt-24 pb-8 px-6 z-30">
            
            <!-- Song Info Row -->
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-4">
                    <!-- Album Cover con silueta custom -->
                    <div class="w-[56px] h-[56px] bg-[#B22518] rounded flex items-center justify-center shadow-md overflow-hidden relative">
                        <svg viewBox="0 0 100 100" class="w-12 h-12 fill-black/90 mt-2">
                            <!-- Cabeza -->
                            <circle cx="50" cy="30" r="7" />
                            <!-- Cuerpo -->
                            <path d="M40 45 L60 45 L55 90 L45 90 Z" />
                            <!-- Brazo Izq -->
                            <path d="M40 45 L15 15 L22 10 L45 38 Z" />
                            <!-- Brazo Der -->
                            <path d="M60 45 L85 15 L78 10 L55 38 Z" />
                        </svg>
                    </div>
                    
                    <div class="flex flex-col">
                        <h2 class="text-[20px] font-bold text-white leading-tight tracking-tight">Drag Path</h2>
                        <p class="text-[15px] text-white/70 font-medium mt-0.5">Twenty One Pilots</p>
                    </div>
                </div>
                
                <!-- Green Check Button -->
                <button class="w-6 h-6 rounded-full bg-[#1ED760] flex items-center justify-center text-black active:scale-95 transition-transform hover:scale-105">
                    <i data-lucide="check" class="w-4 h-4 stroke-[3]"></i>
                </button>
            </div>

            <!-- Progress Bar -->
            <div class="space-y-1.5 mb-6">
                <div id="progress-container" class="w-full h-1 bg-white/20 rounded-full cursor-pointer relative group">
                    <div id="progress-bar" class="h-full bg-white rounded-full w-0 relative transition-all duration-75">
                        <div class="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-md"></div>
                    </div>
                </div>
                <div class="flex justify-between text-[11px] font-medium text-white/60 tracking-wide font-mono">
                    <span id="current-time">0:00</span>
                    <span id="total-time">3:44</span>
                </div>
            </div>

            <!-- Main Playback Controls -->
            <div class="flex items-center justify-between mb-6 px-1">
                <button class="text-[#1ED760] active:scale-90 transition-transform">
                    <i data-lucide="shuffle" class="w-[22px] h-[22px] stroke-[2.5]"></i>
                </button>
                
                <button class="text-white active:scale-90 transition-transform">
                    <i data-lucide="skip-back" class="w-9 h-9 icon-solid"></i>
                </button>
                
                <button id="play-btn" class="w-[64px] h-[64px] flex items-center justify-center bg-white rounded-full text-black hover:scale-105 active:scale-95 transition-transform shadow-xl">
                    <i data-lucide="play" id="play-icon" class="w-8 h-8 ml-1 icon-solid"></i>
                    <i data-lucide="pause" id="pause-icon" class="w-8 h-8 hidden icon-solid"></i>
                </button>
                
                <button class="text-white active:scale-90 transition-transform">
                    <i data-lucide="skip-forward" class="w-9 h-9 icon-solid"></i>
                </button>
                
                <button class="text-white/70 hover:text-white active:scale-90 transition-transform">
                    <i data-lucide="timer" class="w-6 h-6"></i>
                </button>
            </div>

            <!-- Bottom Actions -->
            <div class="flex justify-between items-center px-1">
                <button class="text-white/70 hover:text-white active:scale-90 transition-transform">
                    <i data-lucide="monitor-speaker" class="w-5 h-5"></i>
                </button>
                <div class="flex gap-6">
                    <button class="text-white/70 hover:text-white active:scale-90 transition-transform">
                        <i data-lucide="share-2" class="w-5 h-5"></i>
                    </button>
                    <button class="text-white/70 hover:text-white active:scale-90 transition-transform">
                        <i data-lucide="list-music" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // Inicializar Iconos Lucide
        lucide.createIcons();

        // Letras en formato JSON
        const lyricsData = [
            { time: 0, en: "When I see the devil's eyes", pron: "Wuen ai si de devils ais", es: "Cuando veo los ojos del diablo" },
            { time: 4, en: "A current travels down my spine", pron: "A corrent travels daun mai spain", es: "Un escalofrío recorre mi espalda" },
            { time: 8, en: "He found me", pron: "Ji faund mi", es: "Él me encontró" },
            { time: 13, en: "Seems as though I've lost again", pron: "Sims as dou aiv lost aguen", es: "Parece que he perdido otra vez" },
            { time: 17, en: "A story told ad nauseam", pron: "A stori told ad nosiam", es: "Una historia contada hasta el hartazgo" },
            { time: 21, en: "He found me", pron: "Ji faund mi", es: "Él me encontró" },
            { time: 26, en: "Maybe once or twice or three", pron: "Meibi uans or tuais or zri", es: "Quizás una o dos o tres" },
            { time: 29, en: "He's tried his hand at drowning me", pron: "Jis traid jis jand at drauning mi", es: "Ha intentado ahogarme" },
            { time: 33, en: "But I'm still on fire", pron: "Bat aim stil on faiar", es: "Pero sigo en llamas" },
            { time: 37, en: "At least I'm pretty sure", pron: "At list aim priti shur", es: "Al menos estoy bastante seguro" },
            { time: 43, en: "When I see the devil's eyes", pron: "Wuen ai si de devils ais", es: "Cuando veo los ojos del diablo" },
            { time: 46, en: "I'll look away and smile wide", pron: "Ail luk auei and smail uaid", es: "Desviaré la mirada y sonreiré ampliamente" },
            { time: 51, en: "You found me", pron: "Yu faund mi", es: "Tú me encontraste" },
            { time: 56, en: "'Cause then I'll know you're also there", pron: "Coz den ail no yur olso der", es: "Porque entonces sabré que tú también estás ahí" },
            { time: 60, en: "'Cause proof is in the adversere", pron: "Coz pruf is in de adverser", es: "Porque la prueba está en el adversario" },
            { time: 64, en: "You found me", pron: "Yu faund mi", es: "Tú me encontraste" },
            { time: 68, en: "A drag path etched in the surface", pron: "A drag paz echt in de sorfeis", es: "Un sendero de arrastre grabado en la superficie" },
            { time: 73, en: "As evidence, I left there on purpose", pron: "As evidens, ai left der on porpos", es: "Como evidencia, lo dejé ahí a propósito" },
            { time: 78, en: "A sad sack, laying on the surface", pron: "A sad sak, leiing on de sorfeis", es: "Un perdedor, tirado en la superficie" },
            { time: 82, en: "Can you find me?", pron: "Can yu faind mi?", es: "¿Puedes encontrarme?" },
            { time: 86, en: "I dug my heels into the gravel", pron: "Ai dag mai jils intu de gravel", es: "Clavé mis talones en la grava" },
            { time: 91, en: "As evidence, for you to unravel", pron: "As evidens, for yu tu anravel", es: "Como evidencia, para que tú lo desenredes" },
            { time: 96, en: "A drag path, etched in the surface", pron: "A drag paz, echt in de sorfeis", es: "Un sendero de arrastre, grabado en la superficie" },
            { time: 101, en: "Can you find me?", pron: "Can yu faind mi?", es: "¿Puedes encontrarme?" },
            { time: 107, en: "Would you", pron: "Wud yu", es: "¿Lo harías?" },
            { time: 110, en: "(Would you, ooh)", pron: "(Wud yu, uu)", es: "(¿Lo harías, ooh?)" },
            { time: 114, en: "Please, please hurry", pron: "Plis, plis jarri", es: "Por favor, por favor, apúrate" },
            { time: 120, en: "Can you, can you, can you, can you?", pron: "Can yu, can yu, can yu, can yu?", es: "¿Puedes, puedes, puedes, puedes?" },
            { time: 130, en: "A drag path, etched in the surface", pron: "A drag paz, echt in de sorfeis", es: "Un sendero de arrastre, grabado en la superficie" },
            { time: 135, en: "As evidence, I left there on purpose", pron: "As evidens, ai left der on porpos", es: "Como evidencia, lo dejé ahí a propósito" },
            { time: 140, en: "A sad sack, laying on the surface", pron: "A sad sak, leiing on de sorfeis", es: "Un perdedor, tirado en la superficie" },
            { time: 144, en: "Can you, can you find me?", pron: "Can yu, can yu faind mi?", es: "¿Puedes, puedes encontrarme?" },
            { time: 151, en: "I dug my heels into the gravel", pron: "Ai dag mai jils intu de gravel", es: "Clavé mis talones en la grava" },
            { time: 156, en: "As evidence, for you to unravel", pron: "As evidens, for yu tu anravel", es: "Como evidencia, para que tú lo desenredes" },
            { time: 161, en: "A drag path, etched in the surface", pron: "A drag paz, echt in de sorfeis", es: "Un sendero de arrastre, grabado en la superficie" },
            { time: 166, en: "Can you find me?", pron: "Can yu faind mi?", es: "¿Puedes encontrarme?" },
            { time: 172, en: "Can you find me?", pron: "Can yu faind mi?", es: "¿Puedes encontrarme?" },
            { time: 175, en: "(Can you find me?)", pron: "(Can yu faind mi?)", es: "(¿Puedes encontrarme?)" },
            { time: 180, en: "Can you find me?", pron: "Can yu faind mi?", es: "¿Puedes encontrarme?" },
            { time: 195, en: "Then the Sun begins to rise", pron: "Den de san biguins tu rais", es: "Entonces el sol comienza a salir" },
            { time: 200, en: "We made it through the darkest night", pron: "Wi meid it zru de darkest nait", es: "Lo logramos a través de la noche más oscura" },
            { time: 205, en: "You found me", pron: "Yu faund mi", es: "Tú me encontraste" }
        ];

        // Variables de Estado
        let isPlaying = false;
        let currentTime = 0;
        const totalDuration = 224; // 3:44 en segundos
        let timerInterval;
        let activeIndex = -1;
        let showPron = true;
        let showEsp = true;

        // Elementos del DOM
        const container = document.getElementById('lyrics-container');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const currentTimeEl = document.getElementById('current-time');
        const togglePronBtn = document.getElementById('toggle-pron');
        const toggleEspBtn = document.getElementById('toggle-esp');

        // Renderizar Letras
        function renderLyrics() {
            lyricsData.forEach((lyric, index) => {
                const block = document.createElement('div');
                block.className = 'lyric-line inactive cursor-pointer';
                block.dataset.index = index;
                
                block.innerHTML = `
                    <div class="text-[26px] font-bold text-white tracking-tight leading-tight mb-1 layer-en">${lyric.en}</div>
                    <div class="text-[15px] italic text-white/50 layer-pron mb-1 transition-all duration-300 ${showPron ? 'block' : 'hidden'}">${lyric.pron}</div>
                    <div class="text-[16px] text-white/70 layer-es transition-all duration-300 ${showEsp ? 'block' : 'hidden'}">${lyric.es}</div>
                `;

                block.addEventListener('click', () => {
                    currentTime = lyric.time;
                    updatePlayerUI();
                    syncLyrics();
                    if(!isPlaying) togglePlay();
                });

                container.appendChild(block);
            });
            
            const spacerBottom = document.createElement('div');
            spacerBottom.className = 'h-52'; // Espacio extra por el reproductor más alto
            container.appendChild(spacerBottom);
        }

        // Formato MM:SS
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // Actualizar UI (Progreso)
        function updatePlayerUI() {
            const percentage = (currentTime / totalDuration) * 100;
            progressBar.style.width = `${percentage}%`;
            currentTimeEl.textContent = formatTime(currentTime);
        }

        // Sincronizador de Letras
        function syncLyrics() {
            let newActiveIndex = -1;
            
            for (let i = 0; i < lyricsData.length; i++) {
                if (currentTime >= lyricsData[i].time) {
                    newActiveIndex = i;
                } else {
                    break;
                }
            }

            if (newActiveIndex !== activeIndex && newActiveIndex !== -1) {
                if (activeIndex !== -1) {
                    const oldActive = container.children[activeIndex + 1];
                    oldActive.classList.remove('active');
                    oldActive.classList.add('inactive');
                }

                activeIndex = newActiveIndex;
                const newActiveEl = container.children[activeIndex + 1];
                newActiveEl.classList.remove('inactive');
                newActiveEl.classList.add('active');

                newActiveEl.scrollIntoView({
                    behavior: 'smooth',
                    block: 'center'
                });
            }
        }

        // Control de Play/Pause
        function togglePlay() {
            isPlaying = !isPlaying;
            
            if (isPlaying) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                
                timerInterval = setInterval(() => {
                    currentTime += 0.25; 
                    if (currentTime >= totalDuration) {
                        currentTime = totalDuration;
                        togglePlay(); 
                    }
                    updatePlayerUI();
                    syncLyrics();
                }, 250);
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                clearInterval(timerInterval);
            }
        }

        // Toggles de idiomas
        function updateLayersVisibility() {
            document.querySelectorAll('.layer-pron').forEach(el => el.style.display = showPron ? 'block' : 'none');
            document.querySelectorAll('.layer-es').forEach(el => el.style.display = showEsp ? 'block' : 'none');
        }

        togglePronBtn.addEventListener('click', () => {
            showPron = !showPron;
            togglePronBtn.classList.toggle('active');
            updateLayersVisibility();
        });

        toggleEspBtn.addEventListener('click', () => {
            showEsp = !showEsp;
            toggleEspBtn.classList.toggle('active');
            updateLayersVisibility();
        });

        // Eventos
        playBtn.addEventListener('click', togglePlay);

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percentage = clickX / rect.width;
            currentTime = percentage * totalDuration;
            updatePlayerUI();
            syncLyrics();
        });

        // Init
        renderLyrics();
        updatePlayerUI();
        syncLyrics(); 
    </script>
</body>
</html>
