<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drag Path - Spotify Premium UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .lyric-line { transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out; transform-origin: left center; }
        .lyric-line.active { opacity: 1 !important; transform: scale(1.02); }
        .lyric-line.inactive { opacity: 0.3; transform: scale(1); }

        .toggle-btn.active { background-color: rgba(255, 255, 255, 0.2); color: white; border-color: transparent; }
        .toggle-btn { background-color: transparent; color: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.3); }

        /* Mantenemos tu color base rojo */
        .bg-spotify-gradient { background: linear-gradient(180deg, #A82417 0%, #68170D 40%, #121212 100%); }
        .icon-solid { fill: currentColor; stroke: currentColor; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-black">

    <div class="relative w-full max-w-[400px] h-[100dvh] sm:h-[850px] sm:rounded-[40px] overflow-hidden bg-spotify-gradient shadow-2xl flex flex-col">

            <div class="flex items-center justify-between mb-6 pointer-events-auto">

                    </div>

                    </div>

            </div>

            <div class="space-y-1.5 mb-6 pointer-events-auto">

                    </div>
                </div>
                <div class="flex justify-between text-[11px] font-medium text-white/60 tracking-wide font-mono">

                </div>
            </div>

                </div>
            </div>

    </div>

        let showPron = true;
        let showEsp = true;

        const container = document.getElementById('lyrics-container');
        const togglePronBtn = document.getElementById('toggle-pron');
        const toggleEspBtn = document.getElementById('toggle-esp');

        // ==== RENDERIZADO ====
        function renderLyrics() {
            lyricsData.forEach((lyric, index) => {
                const block = document.createElement('div');
                block.className = 'lyric-line inactive cursor-pointer py-1';
                block.dataset.index = index;
                
                block.innerHTML = `
                    <div class="text-[26px] font-bold text-white tracking-tight leading-tight mb-1 layer-en">${lyric.en}</div>
                    <div class="text-[15px] italic text-white/50 layer-pron mb-1 transition-all duration-300 ${showPron ? 'block' : 'hidden'}">${lyric.pron}</div>
                    <div class="text-[16px] text-white/70 layer-es transition-all duration-300 ${showEsp ? 'block' : 'hidden'}">${lyric.es}</div>
                `;

                // Al hacer clic, centra la línea suavemente
                block.addEventListener('click', () => {
                    block.scrollIntoView({ behavior: 'smooth', block: 'center' });
                });

                container.appendChild(block);
            });
            
            // Espacio al final para que la última letra pueda llegar al centro
            const spacerBottom = document.createElement('div');
            spacerBottom.className = 'h-[50vh]'; 
            container.appendChild(spacerBottom);
        }

        // ==== TOGGLES DE IDIOMA ====
        function updateLayersVisibility() {
            document.querySelectorAll('.layer-pron').forEach(el => el.style.display = showPron ? 'block' : 'none');
            document.querySelectorAll('.layer-es').forEach(el => el.style.display = showEsp ? 'block' : 'none');
        }

        togglePronBtn.addEventListener('click', () => { showPron = !showPron; togglePronBtn.classList.toggle('active'); updateLayersVisibility(); });
        toggleEspBtn.addEventListener('click', () => { showEsp = !showEsp; toggleEspBtn.classList.toggle('active'); updateLayersVisibility(); });

        // ==== MOTOR DE SEGUIMIENTO MANUAL ====
        function initManualScrollSync() {
            const observerOptions = {
                root: container,
                // Define la zona central de activación (ignora el 40% superior y el 40% inferior de la pantalla)
                rootMargin: '-40% 0px -40% 0px', 
                threshold: 0
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        // Apaga todas las líneas
                        document.querySelectorAll('.lyric-line').forEach(el => {
                            el.classList.remove('active');
                            el.classList.add('inactive');
                        });
                        
                        // Enciende la línea en el centro
                        entry.target.classList.remove('inactive');
                        entry.target.classList.add('active');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.lyric-line').forEach(line => observer.observe(line));
        }

        // Inicializar vistas
        renderLyrics();
        initManualScrollSync(); 
    </script>
