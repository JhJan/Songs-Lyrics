<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drag Path - Spotify Premium UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .lyric-line { transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out; transform-origin: left center; }
        .lyric-line.active { opacity: 1 !important; transform: scale(1.02); }
        .lyric-line.inactive { opacity: 0.3; transform: scale(1); }

        .toggle-btn.active { background-color: rgba(255, 255, 255, 0.2); color: white; border-color: transparent; }
        .toggle-btn { background-color: transparent; color: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.3); }

        .bg-spotify-gradient { background: linear-gradient(180deg, #A82417 0%, #68170D 40%, #121212 100%); }
        .icon-solid { fill: currentColor; stroke: currentColor; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-black">

    <div class="relative w-full max-w-[400px] h-[100dvh] sm:h-[850px] sm:rounded-[40px] overflow-hidden bg-spotify-gradient shadow-2xl flex flex-col">
        
        <!-- Header -->
        <header class="flex items-center justify-between px-6 pt-12 pb-4 relative z-20">
            <button class="p-2 -ml-2 text-white/80 hover:text-white active:scale-95 transition-transform"><i data-lucide="chevron-down" class="w-7 h-7"></i></button>
            <div class="flex flex-col items-center">
                <span class="text-xs font-bold tracking-widest text-white/80 uppercase">Letras</span>
                <div class="flex items-center gap-2 mt-1">
                    <button id="toggle-pron" class="toggle-btn active px-3 py-1 text-[10px] font-bold rounded-full transition-colors uppercase tracking-wider">Pron</button>
                    <button id="toggle-esp" class="toggle-btn active px-3 py-1 text-[10px] font-bold rounded-full transition-colors uppercase tracking-wider">Esp</button>
                </div>
            </div>
            <button class="p-2 -mr-2 text-white/80 hover:text-white active:scale-95 transition-transform"><i data-lucide="more-horizontal" class="w-7 h-7"></i></button>
        </header>

        <!-- Lyrics Container -->
        <main id="lyrics-container" class="flex-1 overflow-y-auto no-scrollbar px-6 pb-72 pt-8 space-y-8 relative z-10 scroll-smooth">
            <div id="spacer-top" class="h-10"></div>
        </main>

        <!-- AUDIO REAL: El nombre debe coincidir EXACTAMENTE con el archivo en tu GitHub -->
        <audio id="audio-player" src="drag-path-digital-remains.mp3" preload="auto"></audio>

        <!-- Player Controls -->
        <footer class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black via-[#121212] to-transparent pt-24 pb-8 px-6 z-30">
            
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-4">
                    <div class="w-[56px] h-[56px] bg-[#B22518] rounded flex items-center justify-center shadow-md overflow-hidden relative">
                        <!-- Imágen de portada cargada desde tu GitHub -->
                        <img src="drag-path-cover.jpg" alt="Drag Path Cover" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100x100/A82417/000000?text=TOP'">
                    </div>
                    <div class="flex flex-col">
                        <h2 class="text-[20px] font-bold text-white leading-tight tracking-tight">Drag Path</h2>
                        <p class="text-[15px] text-white/70 font-medium mt-0.5">Twenty One Pilots</p>
                    </div>
                </div>
                <button class="w-6 h-6 rounded-full bg-[#1ED760] flex items-center justify-center text-black active:scale-95 transition-transform hover:scale-105"><i data-lucide="check" class="w-4 h-4 stroke-[3]"></i></button>
            </div>

            <!-- Progress Bar -->
            <div class="space-y-1.5 mb-6">
                <div id="progress-container" class="w-full h-1 bg-white/20 rounded-full cursor-pointer relative group">
                    <div id="progress-bar" class="h-full bg-white rounded-full w-0 relative transition-all duration-75">
                        <div class="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-md"></div>
                    </div>
                </div>
                <div class="flex justify-between text-[11px] font-medium text-white/60 tracking-wide font-mono">
                    <span id="current-time">0:00</span>
                    <span id="total-time">3:44</span>
                </div>
            </div>

            <div class="flex items-center justify-between mb-6 px-1">
                <button class="text-[#1ED760] active:scale-90 transition-transform"><i data-lucide="shuffle" class="w-[22px] h-[22px] stroke-[2.5]"></i></button>
                <button class="text-white active:scale-90 transition-transform"><i data-lucide="skip-back" class="w-9 h-9 icon-solid"></i></button>
                <button id="play-btn" class="w-[64px] h-[64px] flex items-center justify-center bg-white rounded-full text-black hover:scale-105 active:scale-95 transition-transform shadow-xl">
                    <i data-lucide="play" id="play-icon" class="w-8 h-8 ml-1 icon-solid"></i><i data-lucide="pause" id="pause-icon" class="w-8 h-8 hidden icon-solid"></i>
                </button>
                <button class="text-white active:scale-90 transition-transform"><i data-lucide="skip-forward" class="w-9 h-9 icon-solid"></i></button>
                <button class="text-white/70 hover:text-white active:scale-90 transition-transform"><i data-lucide="timer" class="w-6 h-6"></i></button>
            </div>

            <div class="flex justify-between items-center px-1">
                <button class="text-white/70 hover:text-white active:scale-90 transition-transform"><i data-lucide="monitor-speaker" class="w-5 h-5"></i></button>
                <div class="flex gap-6">
                    <button class="text-white/70 hover:text-white active:scale-90 transition-transform"><i data-lucide="share-2" class="w-5 h-5"></i></button>
                    <button class="text-white/70 hover:text-white active:scale-90 transition-transform"><i data-lucide="list-music" class="w-5 h-5"></i></button>
                </div>
            </div>
        </footer>
    </div>

            { time: 213.0, en: "Can you find me?", pron: "Can yu faind mi?", es: "¿Puedes encontrarme?" },
            { time: 215.5, en: "(Can you find me?)", pron: "(Can yu faind mi?)", es: "(¿Puedes encontrarme?)" },
            { time: 217.5, en: "Can you find me?", pron: "Can yu faind mi?", es: "¿Puedes encontrarme?" },
            { time: 220.0, en: "(Can you find me?)", pron: "(Can yu faind mi?)", es: "(¿Puedes encontrarme?)" },
            
            { time: 227.0, en: "Then the Sun begins to rise", pron: "Den de san biguins tu rais", es: "Entonces el sol comienza a salir" },
            { time: 231.5, en: "We made it through the darkest night", pron: "Wi meid it zru de darkest nait", es: "Lo logramos a través de la noche más oscura" },
            { time: 236.0, en: "You found me", pron: "Yu faund mi", es: "Tú me encontraste" }
        ];

        let isPlaying = false;
        let currentTime = 0;
        let totalDuration = 224; // Tiempo base estimado, se actualiza al cargar audio
        let activeIndex = -1;
        let showPron = true;
        let showEsp = true;

        const audio = document.getElementById('audio-player');
        const container = document.getElementById('lyrics-container');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        const togglePronBtn = document.getElementById('toggle-pron');
        const toggleEspBtn = document.getElementById('toggle-esp');

        // ==== LÓGICA DE AUDIO REAL ====
        
        // 1. Cuando el audio carga, ajusta la duración total
        audio.addEventListener('loadedmetadata', () => {
            totalDuration = audio.duration;
            totalTimeEl.textContent = formatTime(totalDuration);
            // Restablecer estilos en caso de que hubiera un error previo
            currentTimeEl.classList.remove('text-red-500', 'font-bold');
            totalTimeEl.classList.remove('text-red-500', 'font-bold');
        });

        // 2. Manejo visual de errores (Si no encuentra el MP3)
        audio.addEventListener('error', () => {
            console.error("No se pudo cargar el audio drag-path-digital-remains.mp3");
            // Muestra error en la interfaz de forma sutil
            currentTimeEl.textContent = "Error";
            currentTimeEl.classList.add('text-red-500', 'font-bold');
            totalTimeEl.textContent = "Sin Audio";
            totalTimeEl.classList.add('text-red-500', 'font-bold');
        });

        // 3. MAGIA: Mientras suena el audio, sincroniza todo
        audio.addEventListener('timeupdate', () => {
            currentTime = audio.currentTime;
            updatePlayerUI();
            syncLyrics();
            
            if(audio.ended) {
                isPlaying = false;
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        });

        // ==== RENDERIZADO Y UI ====
        function renderLyrics() {
            lyricsData.forEach((lyric, index) => {
                const block = document.createElement('div');
                block.className = 'lyric-line inactive cursor-pointer';
                block.dataset.index = index;
                
                block.innerHTML = `
                    <div class="text-[26px] font-bold text-white tracking-tight leading-tight mb-1 layer-en">${lyric.en}</div>
                    <div class="text-[15px] italic text-white/50 layer-pron mb-1 transition-all duration-300 ${showPron ? 'block' : 'hidden'}">${lyric.pron}</div>
                    <div class="text-[16px] text-white/70 layer-es transition-all duration-300 ${showEsp ? 'block' : 'hidden'}">${lyric.es}</div>
                `;

                // Clic en la letra salta en el audio real
                block.addEventListener('click', () => {
                    // Solo salta si el audio se ha cargado correctamente
                    if(!audio.error) {
                        audio.currentTime = lyric.time; 
                        if(!isPlaying) togglePlay();
                    }
                });

                container.appendChild(block);
            });
            const spacerBottom = document.createElement('div');
            spacerBottom.className = 'h-52'; 
            container.appendChild(spacerBottom);
        }

        function formatTime(seconds) {
            if(isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function updatePlayerUI() {
            const percentage = (currentTime / totalDuration) * 100;
            progressBar.style.width = `${percentage}%`;
            // Evitar sobrescribir el texto de error si existe
            if(!audio.error) {
                currentTimeEl.textContent = formatTime(currentTime);
            }
        }

        function syncLyrics() {
            let newActiveIndex = -1;
            for (let i = 0; i < lyricsData.length; i++) {
                if (currentTime >= lyricsData[i].time) { newActiveIndex = i; } 
                else { break; }
            }

            if (newActiveIndex !== activeIndex && newActiveIndex !== -1) {
                if (activeIndex !== -1) {
                    const oldActive = container.children[activeIndex + 1];
                    if(oldActive) {
                        oldActive.classList.remove('active');
                        oldActive.classList.add('inactive');
                    }
                }

                activeIndex = newActiveIndex;
                const newActiveEl = container.children[activeIndex + 1];
                if(newActiveEl) {
                    newActiveEl.classList.remove('inactive');
                    newActiveEl.classList.add('active');
                    newActiveEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        function togglePlay() {
            // Si hay error en el audio, no hace nada para que te des cuenta de que falta el archivo
            if(audio.error) {
                alert("El archivo de audio no se encuentra. Verifica que 'drag-path-digital-remains.mp3' esté subido a GitHub junto a este HTML.");
                return;
            }

            isPlaying = !isPlaying;
            if (isPlaying) {
                let playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(_ => {
                        playIcon.classList.add('hidden');
                        pauseIcon.classList.remove('hidden');
                    })
                    .catch(e => {
                        console.error("El navegador bloqueó el autoplay:", e);
                        isPlaying = false;
                    });
                }
            } else {
                audio.pause();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        }

        function updateLayersVisibility() {
            document.querySelectorAll('.layer-pron').forEach(el => el.style.display = showPron ? 'block' : 'none');
            document.querySelectorAll('.layer-es').forEach(el => el.style.display = showEsp ? 'block' : 'none');
        }

        togglePronBtn.addEventListener('click', () => { showPron = !showPron; togglePronBtn.classList.toggle('active'); updateLayersVisibility(); });
        toggleEspBtn.addEventListener('click', () => { showEsp = !showEsp; toggleEspBtn.classList.toggle('active'); updateLayersVisibility(); });
        playBtn.addEventListener('click', togglePlay);

        progressContainer.addEventListener('click', (e) => {
            if(audio.error) return; // Bloquear salto si no hay audio
            const rect = progressContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            audio.currentTime = (clickX / rect.width) * totalDuration; 
        });

        // Inicializar vistas
        renderLyrics();
        updatePlayerUI();
        syncLyrics(); 
    </script>
</body>
</html>
