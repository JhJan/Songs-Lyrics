<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drag Path - Spotify Premium UI (Manual Scroll)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Ahora todas las líneas son completamente visibles para lectura manual */
        .lyric-line { transition: opacity 0.4s ease-in-out; opacity: 1; }

        .toggle-btn.active { background-color: rgba(255, 255, 255, 0.2); color: white; border-color: transparent; }
        .toggle-btn { background-color: transparent; color: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.3); }

        .bg-spotify-gradient { background: linear-gradient(180deg, #A82417 0%, #68170D 40%, #121212 100%); }
        .icon-solid { fill: currentColor; stroke: currentColor; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-black">

    <div class="relative w-full max-w-[400px] h-[100dvh] sm:h-[850px] sm:rounded-[40px] overflow-hidden bg-spotify-gradient shadow-2xl flex flex-col">
        
        <header class="flex items-center justify-between px-6 pt-12 pb-4 relative z-20">
            <button class="p-2 -ml-2 text-white/80 hover:text-white active:scale-95 transition-transform"><i data-lucide="chevron-down" class="w-7 h-7"></i></button>
            <div class="flex flex-col items-center">
                <span class="text-xs font-bold tracking-widest text-white/80 uppercase">Letras</span>
                <div class="flex items-center gap-2 mt-1">
                    <button id="toggle-pron" class="toggle-btn active px-3 py-1 text-[10px] font-bold rounded-full transition-colors uppercase tracking-wider">Pron</button>
                    <button id="toggle-esp" class="toggle-btn active px-3 py-1 text-[10px] font-bold rounded-full transition-colors uppercase tracking-wider">Esp</button>
                </div>
            </div>
            <button class="p-2 -mr-2 text-white/80 hover:text-white active:scale-95 transition-transform"><i data-lucide="more-horizontal" class="w-7 h-7"></i></button>
        </header>

        <main id="lyrics-container" class="flex-1 overflow-y-auto no-scrollbar px-6 pb-72 pt-8 space-y-8 relative z-10 scroll-smooth">
            <div id="spacer-top" class="h-10"></div>
            </main>

        <footer class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black via-[#121212] to-transparent pt-24 pb-8 px-6 z-30 pointer-events-none">
            
            <div class="flex items-center justify-between mb-6 pointer-events-auto">
                <div class="flex items-center gap-4">
                    <div class="w-[56px] h-[56px] bg-[#B22518] rounded flex items-center justify-center shadow-md overflow-hidden relative">
                        <img src="drag-path-cover.jpg" alt="Drag Path Cover" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100x100/A82417/000000?text=TOP'">
                    </div>
                    <div class="flex flex-col">
                        <h2 class="text-[20px] font-bold text-white leading-tight tracking-tight">Drag Path</h2>
                        <p class="text-[15px] text-white/70 font-medium mt-0.5">Twenty One Pilots</p>
                    </div>
                </div>
                <button class="w-6 h-6 rounded-full bg-[#1ED760] flex items-center justify-center text-black active:scale-95 transition-transform hover:scale-105"><i data-lucide="check" class="w-4 h-4 stroke-[3]"></i></button>
            </div>

            <div class="space-y-1.5 mb-6 pointer-events-auto">
                <div class="w-full h-1 bg-white/20 rounded-full relative">
                    <div class="h-full bg-white rounded-full w-0 relative"></div>
                </div>
                <div class="flex justify-between text-[11px] font-medium text-white/60 tracking-wide font-mono">
                    <span>0:00</span>
                    <span>3:44</span>
                </div>
            </div>

            <div class="flex items-center justify-between mb-6 px-1 pointer-events-auto opacity-70">
                <button><i data-lucide="shuffle" class="w-[22px] h-[22px] stroke-[2.5] text-[#1ED760]"></i></button>
                <button><i data-lucide="skip-back" class="w-9 h-9 icon-solid text-white"></i></button>
                <button class="w-[64px] h-[64px] flex items-center justify-center bg-white rounded-full text-black shadow-xl">
                    <i data-lucide="play" class="w-8 h-8 ml-1 icon-solid"></i>
                </button>
                <button><i data-lucide="skip-forward" class="w-9 h-9 icon-solid text-white"></i></button>
                <button><i data-lucide="timer" class="w-6 h-6 text-white"></i></button>
            </div>

            <div class="flex justify-between items-center px-1 pointer-events-auto">
                <button class="text-white/70 hover:text-white transition-transform"><i data-lucide="monitor-speaker" class="w-5 h-5"></i></button>
                <div class="flex gap-6">
                    <button class="text-white/70 hover:text-white transition-transform"><i data-lucide="share-2" class="w-5 h-5"></i></button>
                    <button class="text-white/70 hover:text-white transition-transform"><i data-lucide="list-music" class="w-5 h-5"></i></button>
                </div>
            </div>
        </footer>
    </div>

        let showPron = true;
        let showEsp = true;

        const container = document.getElementById('lyrics-container');
        const togglePronBtn = document.getElementById('toggle-pron');
        const toggleEspBtn = document.getElementById('toggle-esp');

        // Renderizado estático para scroll manual
        function renderLyrics() {
            lyricsData.forEach((lyric) => {
                const block = document.createElement('div');
                block.className = 'lyric-line';
                
                block.innerHTML = `
                    <div class="text-[26px] font-bold text-white tracking-tight leading-tight mb-1 layer-en">${lyric.en}</div>
                    <div class="text-[15px] italic text-white/50 layer-pron mb-1 transition-all duration-300 ${showPron ? 'block' : 'hidden'}">${lyric.pron}</div>
                    <div class="text-[16px] text-white/70 layer-es transition-all duration-300 ${showEsp ? 'block' : 'hidden'}">${lyric.es}</div>
                `;

                container.appendChild(block);
            });
            const spacerBottom = document.createElement('div');
            spacerBottom.className = 'h-52'; 
            container.appendChild(spacerBottom);
        }

        function updateLayersVisibility() {
            document.querySelectorAll('.layer-pron').forEach(el => el.style.display = showPron ? 'block' : 'none');
            document.querySelectorAll('.layer-es').forEach(el => el.style.display = showEsp ? 'block' : 'none');
        }

        togglePronBtn.addEventListener('click', () => { 
            showPron = !showPron; 
            togglePronBtn.classList.toggle('active'); 
            updateLayersVisibility(); 
        });

        toggleEspBtn.addEventListener('click', () => { 
            showEsp = !showEsp; 
            toggleEspBtn.classList.toggle('active'); 
            updateLayersVisibility(); 
        });

        // Inicializar vistas
        renderLyrics();
    </script>
</body>
</html>
